<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maha Silambam & Martial Academy</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="alternate icon" type="image/png" href="/logo.png?v=3" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#05070a" />
    <style>
      html, body {
        background: #000000;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        width: 100%;
        overflow: hidden;
      }
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100%;
        background: radial-gradient(circle at center, #064e3b 0%, #022c22 35%, #05070a 80%, #000000 100%);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .logo-outer {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, #052e16 0%, #05070a 60%, #000000 100%);
        border: 2px solid rgba(16, 185, 129, 0.3);
        box-shadow: 0 0 40px rgba(16, 185, 129, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        animation: loader-pulse 2s infinite ease-in-out;
      }
      .logo-inner {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        object-fit: cover;
      }
      .loader-text {
        color: #ffffff;
        font-size: 1.5rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
      }
      @keyframes loader-pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 40px rgba(16, 185, 129, 0.25);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 60px rgba(16, 185, 129, 0.45);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="logo-outer">
          <img src="/logo.png?v=3" class="logo-inner" alt="Loading Logo" />
        </div>
        <div class="loader-text">Maha Silambam</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
